name: Build NVIDIA Open GPU Kernel Modules

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      KERNEL: '7.0.9-1-cachyos-bore'
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libelf-dev \
            pkg-config \
            linux-headers-${{ env.KERNEL }} \
            git

      - name: Clone repository
        run: git clone --depth 1 https://github.com/YaroslavZ-ru/open-gpu-kernel-modules.git

      - name: Build modules
        run: |
          cd open-gpu-kernel-modules
          make modules -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nvidia-open-modules-x64
          path: open-gpu-kernel-modules/kernel-open/**/*.ko
          retention-days: 7
